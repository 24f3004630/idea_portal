{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <!-- 🔹 Header -->
    <h2 class="mb-4">🚀 Startup Monitoring</h2>

    <!-- 🔹 Tabs / Filters -->
    <div class="mb-3">
        <span class="badge bg-secondary me-2">All 0</span>
        <span class="badge bg-warning text-dark me-2">Idea 0</span>
        <span class="badge bg-info text-dark me-2">Prototype 0</span>
        <span class="badge bg-primary me-2">MVP 0</span>
        <span class="badge bg-success me-2">Startup 0</span>
        <span class="badge bg-dark">Scaling 0</span>
    </div>

    <hr>

    <!-- 🔹 Empty State (like your screenshot) -->
    <div class="card text-center shadow-sm p-5" style="background:#e6f4f7; border-radius:10px;">

        <div style="font-size:40px;">ℹ️</div>

        <h5 class="mt-3">No Startups found</h5>
        <p class="text-muted">Once projects convert into startups, they will appear here.</p>

    </div>

</div>

{% endblock %}
