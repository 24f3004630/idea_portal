{% extends "base.html" %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-12">
        <h3>Add Publication</h3>
        <p class="text-muted">Project: {{ project.project_title }}</p>
        <hr>
    </div>
</div>

<div class="row">
    <div class="col-md-8">
        <form method="POST" class="needs-validation">
            
            <div class="mb-3">
                <label for="title" class="form-label">Publication Title *</label>
                <input type="text" class="form-control" id="title" name="title" required>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="publication_type" class="form-label">Publication Type *</label>
                        <select class="form-select" id="publication_type" name="publication_type" required>
                            <option value="">-- Select Type --</option>
                            <option value="Journal">Journal</option>
                            <option value="Conference">Conference</option>
                            <option value="Book">Book</option>
                            <option value="Workshop">Workshop</option>
                        </select>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="status" class="form-label">Status *</label>
                        
                        <!-- visible but not editable -->
                        <input type="text" class="form-control bg-light" value="Published" readonly>
                        
                        <!-- actual value sent to backend -->
                        <input type="hidden" name="status" value="Published">
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label for="venue" class="form-label">Venue/Journal Name</label>
                <input type="text" class="form-control" id="venue" name="venue">
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                       <label for="publication_date" class="form-label">Publication Month & Year</label>
<input type="month" class="form-control" id="publication_date" name="publication_date">

                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="volume" class="form-label">Volume/Issue</label>
                        <input type="text" class="form-control" id="volume" name="volume">
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="page_number" class="form-label">Page Number</label>
                        <input type="text" class="form-control" id="page_number" name="page_number" placeholder="e.g., 10-25">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                       <label for="indexing" class="form-label">Indexing</label>
<select class="form-select" id="indexing" name="indexing">
    <option value="">-- Select Indexing --</option>
    <option value="SCI">SCI</option>
    <option value="Scopus">Scopus</option>
    <option value="Other">Other</option>
</select>

                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="doi" class="form-label">DOI</label>
                        <input type="text" class="form-control" id="doi" name="doi">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="issn_isbn" class="form-label">ISSN/ISBN</label>
                        <input type="text" class="form-control" id="issn_isbn" name="issn_isbn">
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label for="publisher" class="form-label">Publisher</label>
                <input type="text" class="form-control" id="publisher" name="publisher">
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Add Publication</button>
                <a href="/faculty/project/{{ project.project_id }}" class="btn btn-secondary">Cancel</a>
            </div>

        </form>
    </div>
</div>

{% endblock %}
