{% extends "base.html" %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-12">
        <h3>Add Funding Details</h3>
        <p class="text-muted">Project: {{ project.project_title }}</p>
        <hr>
    </div>
</div>

<div class="row">
    <div class="col-md-8">
        <form method="POST" class="needs-validation">
            <div class="mb-3">
                <label for="funding_agency" class="form-label">Funding Agency *</label>
                <input type="text" class="form-control" id="funding_agency" name="funding_agency" required>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="funding_type" class="form-label">Funding Type *</label>
                        <select class="form-select" id="funding_type" name="funding_type" required>
                            <option value="">-- Select Type --</option>
                            <option value="GOVT">Government</option>
                            <option value="NGO">NGO</option>
                            <option value="Private">Private</option>
                            <option value="Corporate">Corporate</option>
                            <option value="International">International</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="sanctioned_amount" class="form-label">Sanctioned Amount (₹) *</label>
                        <input type="number" class="form-control" id="sanctioned_amount" name="sanctioned_amount" 
                               step="0.01" min="0" required>
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label for="sanctioned_date" class="form-label">Sanctioned Date</label>
                <input type="date" class="form-control" id="sanctioned_date" name="sanctioned_date">
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Add Funding</button>
                <a href="/faculty/project/{{ project.project_id }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
