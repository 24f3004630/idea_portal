{% extends "base.html" %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-12">
        <h3>Edit IPR / Patent</h3>
        <p class="text-muted">Project: {{ project.project_title }}</p>
        <hr>
    </div>
</div>

<div class="row">
    <div class="col-md-8">
        <form method="POST" class="needs-validation">
            <div class="mb-3">
                <label for="innovation_title" class="form-label">Innovation Title *</label>
                <input type="text" class="form-control" id="innovation_title" name="innovation_title" value="{{ ipr.innovation_title }}" required>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="ipr_type" class="form-label">IPR Type *</label>
                        <select class="form-select" id="ipr_type" name="ipr_type" required>
                            <option value="">-- Select Type --</option>
                            <option value="Patent" {% if ipr.ipr_type == 'Patent' %}selected{% endif %}>Patent</option>
                            <option value="Copyright" {% if ipr.ipr_type == 'Copyright' %}selected{% endif %}>Copyright</option>
                            <option value="Trademark" {% if ipr.ipr_type == 'Trademark' %}selected{% endif %}>Trademark</option>
                            <option value="Design" {% if ipr.ipr_type == 'Design' %}selected{% endif %}>Design</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="grant_status" class="form-label">Grant Status</label>
                        <select class="form-select" id="grant_status" name="grant_status">
                            <option value="Filed" {% if ipr.grant_status == 'Filed' %}selected{% endif %}>Filed</option>
                            <option value="Pending" {% if ipr.grant_status == 'Pending' %}selected{% endif %}>Pending</option>
                            <option value="Granted" {% if ipr.grant_status == 'Granted' %}selected{% endif %}>Granted</option>
                            <option value="Rejected" {% if ipr.grant_status == 'Rejected' %}selected{% endif %}>Rejected</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label for="application_number" class="form-label">Application Number</label>
                <input type="text" class="form-control" id="application_number" name="application_number" value="{{ ipr.application_number }}">
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="filing_date" class="form-label">Filing Date</label>
                        <input type="date" class="form-control" id="filing_date" name="filing_date" value="{{ ipr.filing_date.strftime('%Y-%m-%d') if ipr.filing_date else '' }}">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="grant_date" class="form-label">Grant Date</label>
                        <input type="date" class="form-control" id="grant_date" name="grant_date" value="{{ ipr.grant_date.strftime('%Y-%m-%d') if ipr.grant_date else '' }}">
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="registration_date" class="form-label">Registration Date</label>
                        <input type="date" class="form-control" id="registration_date" name="registration_date" value="{{ ipr.registration_date.strftime('%Y-%m-%d') if ipr.registration_date else '' }}">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="expiry_date" class="form-label">Expiry Date</label>
                        <input type="date" class="form-control" id="expiry_date" name="expiry_date" value="{{ ipr.expiry_date.strftime('%Y-%m-%d') if ipr.expiry_date else '' }}">
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label for="ownership_type" class="form-label">Ownership Type</label>
                <select class="form-select" id="ownership_type" name="ownership_type">
                    <option value="Individual" {% if ipr.ownership_type == 'Individual' %}selected{% endif %}>Individual</option>
                    <option value="Joint" {% if ipr.ownership_type == 'Joint' %}selected{% endif %}>Joint</option>
                    <option value="Organization" {% if ipr.ownership_type == 'Organization' %}selected{% endif %}>Organization</option>
                </select>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Update IPR/Patent</button>
                <a href="/faculty/project/{{ project.project_id }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
