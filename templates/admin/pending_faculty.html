{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">Pending Faculty Registrations</h2>

<table class="table table-striped">
    <thead>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Department</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for user in users %}
        <tr>
            <td>{{ user.name }}</td>
            <td>{{ user.email }}</td>
            <td>{{ user.department or 'N/A' }}</td>
            <td>
                <a href="/admin/approve/{{ user.person_id }}" class="btn btn-success btn-sm">Approve</a>
                <a href="/admin/reject/{{ user.person_id }}" class="btn btn-danger btn-sm">Reject</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<a href="/admin/dashboard" class="btn btn-secondary">Back to Dashboard</a>

{% endblock %}
