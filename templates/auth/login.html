{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card p-5 shadow">
        <h3 class="mb-4 text-center">Login to Idea Portal</h3>

        <form method="POST">
          <div class="mb-3">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" class="form-control" id="email" name="email" required>
          </div>
          
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password" required>
          </div>
          
          <button type="submit" class="btn btn-primary w-100 mb-3">Login</button>
        </form>

        <hr>

        <p class="text-center mb-3">Don't have an account?</p>
        <div class="d-grid gap-2">
          <a href="/auth/register/student" class="btn btn-outline-success">Register as Student</a>
          <a href="/auth/register/faculty" class="btn btn-outline-info">Register as Faculty</a>
        </div>

        <div class="alert alert-info mt-4" role="alert">
          <strong>Demo Credentials:</strong>
          <br>Email: <code>admin@portal.com</code>
          <br>Password: <code>admin123</code>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
